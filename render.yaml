services:
  - type: web
    name: job-copilot
    runtime: node
    region: singapore
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node server/index.js
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8001"
